<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deméter - Gestión de Plagas GTO</title>

<style>

:root{
    --bg-principal:#0d1117;
    --bg-tarjeta:#161b22;
    --borde:#30363d;
    --texto-blanco:#c9d1d9;
    --texto-gris:#8b949e;
    --accent:#238636;
    --accent-hover:#2ea44f;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg-principal);
    color:var(--texto-blanco);
    font-family:Arial, Helvetica, sans-serif;
}

.contenedor{
    max-width:1600px;
    margin:auto;
}

h1{
    margin-bottom:5px;
}

.subtitulo{
    color:var(--texto-gris);
    margin-bottom:30px;
}

/* ========================= */
/* TABS */
/* ========================= */

.tabs-container{
    display:flex;
    gap:10px;
    overflow-x:auto;
    margin-bottom:30px;
    padding-bottom:10px;
    border-bottom:1px solid var(--borde);
}

.tab-btn{
    background:#21262d;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    white-space:nowrap;
    font-size:0.95rem;
}

.tab-btn:hover{
    background:var(--accent);
}

.tab-btn.active{
    background:var(--accent);
}

/* ========================= */
/* MASONRY LAYOUT */
/* ========================= */

.grid-plagas{
    column-count:4;
    column-gap:20px;
}

/* ========================= */
/* TARJETAS */
/* ========================= */

.card-plaga{
    display:inline-block;
    width:100%;

    margin-bottom:20px;

    background:var(--bg-tarjeta);

    border:1px solid var(--borde);

    border-radius:12px;

    overflow:hidden;

    transition:0.3s;

    cursor:pointer;

    break-inside:avoid;
}

.card-plaga:hover{
    transform:translateY(-5px);
    border-color:var(--accent);
    box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

/* ========================= */
/* IMAGEN */
/* ========================= */

.img-container{
    width:100%;
    height:220px;
    overflow:hidden;
}

.img-container img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s;
}

.card-plaga:hover img{
    transform:scale(1.05);
}

/* ========================= */
/* BOTON */
/* ========================= */

.click-hint{
    background:#1f242c;
    text-align:center;
    padding:10px;
    font-size:0.85rem;
    color:#c9d1d9;
    border-top:1px solid #30363d;
    transition:0.3s;
}

.card-plaga:hover .click-hint{
    background:var(--accent);
}

/* ========================= */
/* INFO */
/* ========================= */

.card-info{
    display:none;
    padding:18px;
    animation:fadeIn 0.3s ease;
}

.card-plaga.active .card-info{
    display:block;
}

/* ========================= */
/* ANIMACION */
/* ========================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* ========================= */
/* TEXTO */
/* ========================= */

.nombre-comun{
    margin:0;
    color:white;
    font-size:1.35rem;
}

.nombre-cientifico{
    color:var(--accent-hover);
    font-style:italic;
    display:block;
    margin-top:5px;
    margin-bottom:15px;
    font-size:0.95rem;
}

.descripcion{
    color:#b1bac4;
    line-height:1.6;
    font-size:0.95rem;
}

/* ========================= */
/* INFO EXTRA */
/* ========================= */

.extra-info{
    margin-top:15px;
    background:#1c2128;
    padding:14px;
    border-radius:10px;
    border:1px solid #30363d;
}

.extra-info h4{
    margin-top:12px;
    margin-bottom:10px;
    color:#58a6ff;
    font-size:0.95rem;
}

.extra-info ul{
    padding-left:18px;
    line-height:1.7;
    color:#c9d1d9;
}

.extra-info li{
    margin-bottom:6px;
}

.riesgo{
    color:#ffb86b;
    font-weight:bold;
    font-size:1rem;
}

/* ========================= */
/* OCULTAR */
/* ========================= */

.hidden{
    display:none !important;
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:1400px){

    .grid-plagas{
        column-count:3;
    }

}

@media(max-width:1000px){

    .grid-plagas{
        column-count:2;
    }

}

@media(max-width:700px){

    .grid-plagas{
        column-count:1;
    }

    body{
        padding:15px;
    }

}

</style>
</head>

function toggleInfo(tarjeta){

tarjeta.classList.toggle("active");

const hint = tarjeta.querySelector(".click-hint");

if(tarjeta.classList.contains("active")){
hint.textContent = "Ocultar información";
}else{
hint.textContent = "Ver información";
}

}

function filtrarCultivo(cultivo, elementoActivo){

const botones = document.querySelectorAll(".tab-btn");

botones.forEach(btn=>{
btn.classList.remove("active");
});

elementoActivo.classList.add("active");

const tarjetas = document.querySelectorAll(".card-plaga");

tarjetas.forEach(tarjeta=>{

tarjeta.classList.remove("active");

const hint = tarjeta.querySelector(".click-hint");

hint.textContent = "Ver información";

if(cultivo==="todos"){

tarjeta.classList.remove("hidden");

}else{

if(tarjeta.getAttribute("data-cultivo")===cultivo){

tarjeta.classList.remove("hidden");

}else{

tarjeta.classList.add("hidden");

}

}

});

}
